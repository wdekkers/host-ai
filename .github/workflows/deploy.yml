name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/walt
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::247187613539:role/hostpilot-github-actions

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @walt/contracts build
      - run: pnpm lint
      - run: pnpm typecheck

  test-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: walt
          POSTGRES_PASSWORD: walt
          POSTGRES_DB: walt
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @walt/contracts build

      - name: Run migrations against fresh Postgres
        run: pnpm --filter @walt/db db:migrate
        env:
          DATABASE_URL: postgres://walt:walt@localhost:5432/walt

  build-and-push:
    needs: [lint-and-typecheck, test-migrations]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: web
            dockerfile: infra/docker/Dockerfile.web
            image_suffix: web
          - name: fastify
            dockerfile: infra/docker/Dockerfile.fastify
            image_suffix: fastify
          - name: migrate
            dockerfile: infra/docker/Dockerfile.migrate
            image_suffix: migrate
          - name: caddy
            dockerfile: infra/docker/Dockerfile.caddy
            image_suffix: caddy
          - name: sites
            dockerfile: infra/docker/Dockerfile.sites
            image_suffix: sites
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}:latest
            ${{ env.IMAGE_PREFIX }}-${{ matrix.image_suffix }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Assume AWS role via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch secrets from AWS Secrets Manager
        id: secrets
        run: |
          get() { aws secretsmanager get-secret-value --secret-id "$1" --query SecretString --output text; }

          DATABASE_URL=$(get hostpilot/prod/database-url)
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$(get hostpilot/prod/clerk-publishable-key)
          CLERK_SECRET_KEY=$(get hostpilot/prod/clerk-secret-key)
          HOSPITABLE_API_KEY=$(get hostpilot/prod/hospitable-api-key)
          HOSPITABLE_BASE_URL=$(get hostpilot/prod/hospitable-base-url)
          OPENAI_API_KEY=$(get hostpilot/prod/openai-api-key)
          GHCR_TOKEN=$(get hostpilot/prod/ghcr-token)
          IAQUALINK_USERNAME=$(get hostpilot/prod/iaqualink-username)
          IAQUALINK_PASSWORD=$(get hostpilot/prod/iaqualink-password)
          CRON_SECRET=$(get hostpilot/prod/cron-secret)
          STRIPE_SECRET_KEY=$(get hostpilot/prod/stripe-secret-key)
          STRIPE_WEBHOOK_SECRET=$(get hostpilot/prod/stripe-webhook-secret)
          PRICELABS_ENCRYPTION_KEY=$(get hostpilot/prod/pricelabs-encryption-key)

          # Mask all values so they never appear in logs
          echo "::add-mask::$DATABASE_URL"
          echo "::add-mask::$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
          echo "::add-mask::$CLERK_SECRET_KEY"
          echo "::add-mask::$HOSPITABLE_API_KEY"
          echo "::add-mask::$OPENAI_API_KEY"
          echo "::add-mask::$GHCR_TOKEN"
          echo "::add-mask::$IAQUALINK_USERNAME"
          echo "::add-mask::$IAQUALINK_PASSWORD"
          echo "::add-mask::$CRON_SECRET"
          echo "::add-mask::$STRIPE_SECRET_KEY"
          echo "::add-mask::$STRIPE_WEBHOOK_SECRET"
          echo "::add-mask::$PRICELABS_ENCRYPTION_KEY"

          echo "DATABASE_URL=$DATABASE_URL" >> "$GITHUB_OUTPUT"
          echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" >> "$GITHUB_OUTPUT"
          echo "CLERK_SECRET_KEY=$CLERK_SECRET_KEY" >> "$GITHUB_OUTPUT"
          echo "HOSPITABLE_API_KEY=$HOSPITABLE_API_KEY" >> "$GITHUB_OUTPUT"
          echo "HOSPITABLE_BASE_URL=$HOSPITABLE_BASE_URL" >> "$GITHUB_OUTPUT"
          echo "OPENAI_API_KEY=$OPENAI_API_KEY" >> "$GITHUB_OUTPUT"
          echo "GHCR_TOKEN=$GHCR_TOKEN" >> "$GITHUB_OUTPUT"
          echo "IAQUALINK_USERNAME=$IAQUALINK_USERNAME" >> "$GITHUB_OUTPUT"
          echo "IAQUALINK_PASSWORD=$IAQUALINK_PASSWORD" >> "$GITHUB_OUTPUT"
          echo "CRON_SECRET=$CRON_SECRET" >> "$GITHUB_OUTPUT"
          echo "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY" >> "$GITHUB_OUTPUT"
          echo "STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET" >> "$GITHUB_OUTPUT"
          echo "PRICELABS_ENCRYPTION_KEY=$PRICELABS_ENCRYPTION_KEY" >> "$GITHUB_OUTPUT"

      - name: Encode compose file
        id: compose
        run: echo "b64=$(base64 -w0 infra/docker-compose.prod.yml)" >> "$GITHUB_OUTPUT"

      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.LIGHTSAIL_HOST }}
          username: ${{ vars.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: GITHUB_ACTOR,GHCR_TOKEN,DATABASE_URL,NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY,CLERK_SECRET_KEY,HOSPITABLE_API_KEY,HOSPITABLE_BASE_URL,OPENAI_API_KEY,IAQUALINK_USERNAME,IAQUALINK_PASSWORD,CRON_SECRET,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,PRICELABS_ENCRYPTION_KEY,IMAGE_TAG,COMPOSE_B64
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # Always deploy the latest docker-compose from the repo
            echo "$COMPOSE_B64" | base64 -d > /opt/walt/docker-compose.prod.yml

            # Derive Clerk JWT config from publishable key (base64url payload = frontend API domain)
            CLERK_DOMAIN=$(printf '%s' "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" | awk -F'_' '{print $NF}' | tr -- '-_' '+/' | base64 -d 2>/dev/null | tr -d '\0$')
            CLERK_JWT_ISSUER="https://$CLERK_DOMAIN"
            CLERK_JWKS_URL="https://$CLERK_DOMAIN/.well-known/jwks.json"

            cat > /opt/walt/.env.production << EOF
            DATABASE_URL=$DATABASE_URL
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
            CLERK_SECRET_KEY=$CLERK_SECRET_KEY
            CLERK_JWT_ISSUER=$CLERK_JWT_ISSUER
            CLERK_JWKS_URL=$CLERK_JWKS_URL
            HOSPITABLE_API_KEY=$HOSPITABLE_API_KEY
            HOSPITABLE_BASE_URL=$HOSPITABLE_BASE_URL
            OPENAI_API_KEY=$OPENAI_API_KEY
            IAQUALINK_USERNAME=$IAQUALINK_USERNAME
            IAQUALINK_PASSWORD=$IAQUALINK_PASSWORD
            CRON_SECRET=$CRON_SECRET
            STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
            STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
            PRICELABS_ENCRYPTION_KEY=$PRICELABS_ENCRYPTION_KEY
            EOF

            cd /opt/walt
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -a -f
        env:
          GHCR_TOKEN: ${{ steps.secrets.outputs.GHCR_TOKEN }}
          DATABASE_URL: ${{ steps.secrets.outputs.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ steps.secrets.outputs.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ steps.secrets.outputs.CLERK_SECRET_KEY }}
          HOSPITABLE_API_KEY: ${{ steps.secrets.outputs.HOSPITABLE_API_KEY }}
          HOSPITABLE_BASE_URL: ${{ steps.secrets.outputs.HOSPITABLE_BASE_URL }}
          OPENAI_API_KEY: ${{ steps.secrets.outputs.OPENAI_API_KEY }}
          IAQUALINK_USERNAME: ${{ steps.secrets.outputs.IAQUALINK_USERNAME }}
          IAQUALINK_PASSWORD: ${{ steps.secrets.outputs.IAQUALINK_PASSWORD }}
          CRON_SECRET: ${{ steps.secrets.outputs.CRON_SECRET }}
          STRIPE_SECRET_KEY: ${{ steps.secrets.outputs.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ steps.secrets.outputs.STRIPE_WEBHOOK_SECRET }}
          PRICELABS_ENCRYPTION_KEY: ${{ steps.secrets.outputs.PRICELABS_ENCRYPTION_KEY }}
          IMAGE_TAG: ${{ github.sha }}
          COMPOSE_B64: ${{ steps.compose.outputs.b64 }}
