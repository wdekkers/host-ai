x-common: &common
  restart: unless-stopped
  env_file:
    - ./.env.production
  networks:
    - walt-net

x-fastify: &fastify
  <<: *common
  image: ghcr.io/wdekkers/walt-fastify:${IMAGE_TAG:-latest}

services:
  # ──────────────────────────────────────────
  # Reverse Proxy — only public-facing container
  # ──────────────────────────────────────────
  caddy:
    image: ghcr.io/wdekkers/walt-caddy:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - walt-net
    deploy:
      resources:
        limits:
          memory: 64M

  # ──────────────────────────────────────────
  # Database Migration — runs once, then exits
  # ──────────────────────────────────────────
  migrate:
    image: ghcr.io/wdekkers/walt-migrate:${IMAGE_TAG:-latest}
    <<: *common
    restart: 'no'
    deploy:
      resources:
        limits:
          memory: 256M

  # ──────────────────────────────────────────
  # Next.js Web Dashboard
  # ──────────────────────────────────────────
  web:
    image: ghcr.io/wdekkers/walt-web:${IMAGE_TAG:-latest}
    <<: *common
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - GATEWAY_BASE_URL=http://gateway:4000
    deploy:
      resources:
        limits:
          memory: 384M

  # ──────────────────────────────────────────
  # Next.js Sites (property marketing sites)
  # ──────────────────────────────────────────
  sites:
    image: ghcr.io/wdekkers/walt-sites:${IMAGE_TAG:-latest}
    <<: *common
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=3001
      - HOSTNAME=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 384M

  # ──────────────────────────────────────────
  # API Gateway
  # ──────────────────────────────────────────
  gateway:
    <<: *fastify
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=4000
      - MESSAGING_SERVICE_URL=http://messaging:4102
      - TASKS_SERVICE_URL=http://tasks:4105
    command: ['apps/gateway/dist/index.js']
    deploy:
      resources:
        limits:
          memory: 192M

  # ──────────────────────────────────────────
  # Microservices
  # ──────────────────────────────────────────
  identity:
    <<: *fastify
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=4101
    command: ['services/identity/dist/index.js']
    deploy:
      resources:
        limits:
          memory: 128M

  messaging:
    <<: *fastify
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=4102
    command: ['services/messaging/dist/index.js']
    deploy:
      resources:
        limits:
          memory: 128M

  ops:
    <<: *fastify
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=4103
    command: ['services/ops/dist/index.js']
    deploy:
      resources:
        limits:
          memory: 128M

  notifications:
    <<: *fastify
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=4104
    command: ['services/notifications/dist/index.js']
    deploy:
      resources:
        limits:
          memory: 128M

  tasks:
    <<: *fastify
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=4105
    command: ['services/tasks/dist/index.js']
    deploy:
      resources:
        limits:
          memory: 128M

  bookings:
    <<: *fastify
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      - PORT=4106
    command: ['services/bookings/dist/index.js']
    deploy:
      resources:
        limits:
          memory: 128M

networks:
  walt-net:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
