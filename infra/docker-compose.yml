version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: hostpilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hostpilot
      POSTGRES_PASSWORD: hostpilot
      POSTGRES_DB: hostpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
