version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: walt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: walt
      POSTGRES_PASSWORD: walt
      POSTGRES_DB: walt
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
