openapi: 3.0.3
info:
  title: Example Provider API
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /health:
    get:
      operationId: getHealth
      responses:
        '200':
          description: API health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                required: [status]
